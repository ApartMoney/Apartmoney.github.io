<script>
const BASE = "https://home.niee.kr";
const INCHEON_CITY = "인천광역시";

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const fmt = n => (n == null || n === '' || isNaN(n)) ? '-' : Math.round(Number(n)).toLocaleString();
const pct = (a, b) => (!b || !isFinite(a/b)) ? '-' : ((a/b)*100).toFixed(1);
const toast = msg => { const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1500); };
const isoToday = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };

async function fetchJson(path, params) {
  const qs = new URLSearchParams(params).toString();
  const res = await fetch(`${BASE}${path}?${qs}`);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

/* ========= 이미지 저장 ========= */
async function saveAsImage(el, filename) {
  if (!window.domtoimage) { toast('라이브러리 로드 실패'); return; }
  toast('이미지 생성 중…');
  try {
    // 캡처 전 모든 카드의 overflow:hidden 임시 해제 (잘림 방지)
    const cards = el.querySelectorAll('.card');
    const origOverflow = [];
    cards.forEach(c => { origOverflow.push(c.style.overflow); c.style.overflow = 'visible'; });

    // 레이아웃 강제 재계산
    el.getBoundingClientRect();

    const rect = el.getBoundingClientRect();
    const w = Math.ceil(Math.max(rect.width, el.scrollWidth));
    const h = Math.ceil(Math.max(rect.height, el.scrollHeight)) + 20;  // 넉넉하게 하단 여유

    const dataUrl = await domtoimage.toPng(el, {
      bgcolor: '#ffffff',
      scale: 2,
      width: w,
      height: h,
      style: {
        transform: 'scale(1)',
        'transform-origin': 'top left',
        margin: '0',
        padding: '0 0 20px 0',
      },
      filter: (node) => !(node.classList && (node.classList.contains('save-btn') || node.classList.contains('copy-btn'))),
    });

    // 원복
    cards.forEach((c, i) => { c.style.overflow = origOverflow[i]; });

    const link = document.createElement('a');
    link.download = filename;
    link.href = dataUrl;
    link.click();
    toast('저장됨');
  } catch (e) {
    console.error(e);
    toast('저장 실패: ' + e.message);
  }
}

/* ========= 지역 드롭다운 ========= */
let cityList = [], stateList = [], dongList = [];

async function loadCities() {
  cityList = await fetchJson('/city');
  const sel = $('#citySel');
  sel.innerHTML = '<option value="">전체 (시/도)</option>';
  cityList.forEach(c => sel.innerHTML += `<option value="${c.CODE}">${c.CITY}</option>`);
}
async function loadStates(cityCode) {
  const sel = $('#stateSel');
  sel.innerHTML = '<option value="">전체 (시/군/구)</option>';
  $('#dongSel').innerHTML = '<option value="">전체 (동)</option>';
  if (!cityCode) { stateList = []; return; }
  stateList = await fetchJson('/state', { city: cityCode });
  stateList.forEach(s => sel.innerHTML += `<option value="${s.CODE}">${s.STATE}</option>`);
}
async function loadDongs(stateCode) {
  const sel = $('#dongSel');
  sel.innerHTML = '<option value="">전체 (동)</option>';
  if (!stateCode) { dongList = []; return; }
  dongList = await fetchJson('/dong', { code: stateCode });
  dongList.forEach(d => sel.innerHTML += `<option value="${d.DONG}">${d.DONG}</option>`);
}

$('#citySel').onchange = async e => { await loadStates(e.target.value); page = 1; load(); };
$('#stateSel').onchange = async e => { await loadDongs(e.target.value); page = 1; load(); };
$('#dongSel').onchange = () => { page = 1; load(); };

/* ========= 즐겨찾기 ========= */
const FAV_KEY = 'apart_daily_favs';
function getFavs() { try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); } catch { return []; } }
function setFavs(list) { localStorage.setItem(FAV_KEY, JSON.stringify(list)); renderFavs(); }
function currentRegion() {
  const c = $('#citySel'), s = $('#stateSel'), d = $('#dongSel');
  return {
    city: c.value, cityName: c.options[c.selectedIndex]?.text || '',
    state: s.value, stateName: s.options[s.selectedIndex]?.text || '',
    dong: d.value, dongName: d.value,
  };
}
function favLabel(f) {
  const parts = [];
  if (f.city) parts.push(f.cityName.replace(' (시/도)','').replace('전체','').trim());
  if (f.state) parts.push(f.stateName);
  if (f.dong) parts.push(f.dong);
  return parts.filter(Boolean).join(' › ') || '전체';
}
function renderFavs() {
  const host = $('#favList');
  // ⭐ 라벨은 유지, 칩만 교체
  host.querySelectorAll('.fav-chip').forEach(el => el.remove());
  const favs = getFavs();
  if (!favs.length) {
    const empty = document.createElement('span');
    empty.className = 'fav-chip empty';
    empty.textContent = '⭐ 버튼으로 지역 저장';
    host.appendChild(empty);
    return;
  }
  favs.forEach((f, i) => {
    const chip = document.createElement('span');
    chip.className = 'fav-chip';
    chip.innerHTML = `<span class="lbl">${favLabel(f)}</span><span class="del" title="삭제">×</span>`;
    chip.querySelector('.lbl').onclick = () => applyFav(f);
    chip.querySelector('.del').onclick = (e) => { e.stopPropagation(); const list = getFavs(); list.splice(i,1); setFavs(list); };
    host.appendChild(chip);
  });
}
async function applyFav(f) {
  $('#citySel').value = f.city || '';
  await loadStates(f.city || '');
  $('#stateSel').value = f.state || '';
  await loadDongs(f.state || '');
  $('#dongSel').value = f.dong || '';
  page = 1;
  load();
}
$('#favBtn').onclick = () => {
  const cur = currentRegion();
  if (!cur.city && !cur.state && !cur.dong) { toast('지역을 먼저 선택'); return; }
  const favs = getFavs();
  // 중복 방지
  if (favs.find(f => f.city===cur.city && f.state===cur.state && f.dong===cur.dong)) { toast('이미 저장됨'); return; }
  favs.push(cur);
  setFavs(favs);
  toast('즐겨찾기 저장됨');
};

/* ========= 요약 (일일 종합) ========= */
function parseCityRow(row) {
  if (!row || !row.STATE) return [];
  const states = String(row.STATE).split(',');
  const cnts = String(row.CNT ?? '').split(',');
  const avgs = String(row.AVG_MONEY ?? '').split(',');
  const maxs = String(row.MAX_MONEY ?? '').split(',');
  const mins = String(row.MIN_MONEY ?? '').split(',');
  return states.map((s, i) => ({
    label: s, cnt: Number(cnts[i] || 0), avg: Number(avgs[i] || 0),
    max: Number(maxs[i] || 0), min: Number(mins[i] || 0),
  }));
}

/* ========= 거래 카드 ========= */
function renderDealCard(r, idx) {
  const dealPrice = Number(r.DEAL_MONEY_NUM || 0);
  const maxPrice = Number(r.MAX_DEAL_MONEY || 0);
  const isCanceled = r.IS_CANCEL === 'Y' || !!r.CANCEL_DATE;
  const hasBtween = r.DEAL_BTWEEN != null && Number(r.DEAL_BTWEEN) >= 0;
  const dealBtween = Number(r.DEAL_BTWEEN || 0);
  const prevHigh = hasBtween ? Math.max(0, dealPrice - dealBtween) : 0;

  const avgInfo = (r.LAST_AVG && r.LAST_AVG[0]) || {};
  const avgMoney = Number(avgInfo['AVG(DEAL_MONEY_NUM)'] || 0);
  const avgDiff = dealPrice - avgMoney;
  const avgDiffPct = avgMoney ? pct(Math.abs(avgDiff), avgMoney) : '-';
  const lastDealDate = avgInfo['LAST_DEAL_DAY'] || avgInfo['MAX(LAST_DEAL_DAY)'] || '';
  const hasPrevDeal = !!lastDealDate;

  const isFirstDeal = !hasPrevDeal && !isCanceled;
  const isNewHigh = !isFirstDeal && hasBtween && dealBtween > 0 && prevHigh > 0 && !isCanceled;
  const newHighPct = isNewHigh ? pct(dealBtween, prevHigh) : '-';
  const diff = dealPrice - maxPrice;
  const diffPct = maxPrice ? pct(Math.abs(diff), maxPrice) : '-';
  const age = Number(r.DEAL_YEAR) - Number(r.APART_CREATED_YEAR) + 1;

  const jData = (r.LAST_J_DATA && r.LAST_J_DATA[0]) || null;
  let jeonseHTML = '';
  if (jData) {
    const jAvg = Number(jData.AVG_MONEY || 0);
    const ratio = dealPrice ? ((jAvg/dealPrice)*100).toFixed(1) : '-';
    jeonseHTML = `
      <div class="gap"></div>
      <div class="jeonse">전세평균 <b>${fmt(jAvg)}</b> · ${ratio}%(${jData.CNT})</div>`;
  }

  const when = `${r.DEAL_YEAR}.${r.DEAL_MONTH}.${r.DEAL_DAY}`;
  const diffSign = diff < 0 ? '▼' : diff > 0 ? '▲' : '';
  const diffClass = diff < 0 ? 'down' : diff > 0 ? 'up' : '';
  const avgSign = avgDiff < 0 ? '▼' : avgDiff > 0 ? '▲' : '';
  const avgClass = avgDiff < 0 ? 'down' : avgDiff > 0 ? 'up' : '';

  const cancelLine = isCanceled ? `<div class="cancel-date">취소: ${r.CANCEL_DATE || ''}</div>` : '';
  const dealType = r.DEAL_TYPE && r.DEAL_TYPE.trim() ? r.DEAL_TYPE.trim() : '중개거래';

  const div = document.createElement('div');
  div.className = 'deal' + (isCanceled ? ' canceled' : '');
  div.dataset.type = dealType;
  div.innerHTML = `
    <div class="deal-left">
      <div class="ttl"><span class="idx">${idx}.</span>${r.APART_NAME}</div>
      <div class="nation">전국 ${r.RANKING||'-'}위 · ${age}년차</div>
      <div class="addr">${r.CITY||''} ${r.STATE||''} ${r.APART_DONG||''} ${r.APART_ADDRESS||''}</div>
      <div class="size">${r.APART_SIZE}㎡ / ${r.DEAL_FLOOR}층</div>
      <div class="dates">거래 ${when}<br>이전 ${lastDealDate || '-'}</div>
      ${cancelLine}
    </div>
    <div class="deal-right">
      <div class="price">${fmt(dealPrice)}<span class="unit">만원</span></div>
      ${isNewHigh ? `
        <div class="new-high-badge">🔥 신고가</div>
        <div class="ref-line">전고가 <b>${fmt(prevHigh)}</b></div>
        <div class="up">▲${fmt(dealBtween)} (${newHighPct}%)</div>
      ` : isFirstDeal ? `
        <div class="new-badge">NEW</div>
        <div class="ref-line">첫 거래</div>
      ` : `
        <div class="ref-line">최고가 <b>${fmt(maxPrice)}</b></div>
        <div class="${diffClass}">${diffSign}${fmt(Math.abs(diff))} (${diffPct}%)</div>
      `}
      <div class="gap"></div>
      <div class="ref-line">10건평균 <b>${fmt(avgMoney)}</b></div>
      <div class="${avgClass}">${avgSign}${fmt(Math.abs(avgDiff))} (${avgDiffPct}%)</div>
      ${jeonseHTML}
    </div>`;
  return div;
}

/* ========= 페이지 ========= */
let page = 1;
let sortMode = 'price';
let lastQueryInfo = { dateStr: '', total: 0 };

function renderPager(container, curPage, totalPages) {
  if (totalPages <= 1) return;
  const nav = document.createElement('div');
  nav.className = 'pager';

  const mk = (label, p, disabled, on) => {
    const b = document.createElement('button');
    b.textContent = label;
    if (disabled) b.disabled = true;
    if (on) b.classList.add('on');
    if (!disabled && !on) b.onclick = () => { page = p; load(); window.scrollTo({top:0,behavior:'smooth'}); };
    return b;
  };

  nav.appendChild(mk('◀', curPage-1, curPage===1));
  // 숫자: 현재±2, 처음/끝
  const nums = new Set([1, totalPages, curPage-2, curPage-1, curPage, curPage+1, curPage+2]);
  const sorted = [...nums].filter(n => n>=1 && n<=totalPages).sort((a,b)=>a-b);
  let prev = 0;
  for (const n of sorted) {
    if (n - prev > 1) { const ell = document.createElement('span'); ell.className='ell'; ell.textContent='…'; nav.appendChild(ell); }
    nav.appendChild(mk(String(n), n, false, n===curPage));
    prev = n;
  }
  nav.appendChild(mk('▶', curPage+1, curPage===totalPages));
  container.appendChild(nav);
}

function renderDealsSection(container, { rows, total, dateStr, pageNum, totalPages }) {
  container.innerHTML = '';
  const header = document.createElement('div');
  header.className = 'deals-header';
  const reg = currentRegion();
  const regLabel = [reg.cityName, reg.stateName, reg.dong].filter(x => x && !/전체/.test(x)).join(' ') || '전국';
  header.innerHTML = `
    <div class="deals-title">
      <span>🏠 ${regLabel} 당일 실거래</span>
      <span class="range">${dateStr}</span>
      <span class="count">총 ${total} 건</span>
      <button class="save-btn dark" id="saveDealsBtn">📥 현재 페이지 저장</button>
    </div>
    <div class="sort-bar">
      <button data-sort="price" ${sortMode==='price'?'class="on"':''}>거래금액 높은순</button>
      <button data-sort="dong" ${sortMode==='dong'?'class="on"':''}>동별</button>
      <button data-sort="diff" ${sortMode==='diff'?'class="on"':''}>최고가 대비</button>
    </div>
    <div class="legend">
      <span><i style="background:#4b5ec4"></i>중개거래</span>
      <span><i style="background:#0a9e5a"></i>직거래</span>
      <span><i style="background:#c0392b"></i>취소</span>
    </div>`;
  container.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'deals-grid';
  container.appendChild(grid);

  const sorted = [...rows];
  sorted.sort((a,b) => {
    if (sortMode === 'price') return Number(b.DEAL_MONEY_NUM||0) - Number(a.DEAL_MONEY_NUM||0);
    if (sortMode === 'dong') return (a.APART_DONG||'').localeCompare(b.APART_DONG||'') || Number(b.DEAL_MONEY_NUM||0) - Number(a.DEAL_MONEY_NUM||0);
    if (sortMode === 'diff') {
      const da = Number(a.DEAL_MONEY_NUM||0) - Number(a.MAX_DEAL_MONEY||0);
      const db = Number(b.DEAL_MONEY_NUM||0) - Number(b.MAX_DEAL_MONEY||0);
      return db - da;
    }
    return 0;
  });
  const startIdx = (pageNum - 1) * 30 + 1;
  sorted.forEach((r, i) => grid.appendChild(renderDealCard(r, startIdx + i)));

  header.querySelectorAll('.sort-bar button').forEach(btn => {
    btn.onclick = () => {
      sortMode = btn.dataset.sort;
      page = 1;
      load();
    };
  });

  // 저장 버튼: header + grid 묶어서 캡처
  const saveBtn = header.querySelector('#saveDealsBtn');
  if (saveBtn) {
    saveBtn.onclick = () => {
      const wrap = document.createElement('div');
      wrap.style.cssText = 'background:#eef1f6;padding:12px;display:inline-block';
      const headerClone = header.cloneNode(true);
      const gridClone = grid.cloneNode(true);
      headerClone.querySelector('#saveDealsBtn')?.remove();
      headerClone.querySelector('.sort-bar')?.remove();
      wrap.appendChild(headerClone);
      wrap.appendChild(gridClone);
      wrap.style.width = grid.offsetWidth + 'px';
      document.body.appendChild(wrap);
      saveAsImage(wrap, `${regLabel}_실거래_${dateStr}_p${pageNum}.png`).finally(() => {
        wrap.remove();
      });
    };
  }

  renderPager(container, pageNum, totalPages);
}

/* ========= 로드 ========= */
async function load() {
  const date = $('#dateInput').value || isoToday();
  const reg = currentRegion();
  $('#sec-summary').innerHTML = '<div class="loading">불러오는 중…</div>';
  $('#sec-deals').innerHTML = '<div class="loading">불러오는 중…</div>';
  $('#status').textContent = '';
  const t0 = performance.now();

  try {
    const dealParams = { btweenDate: date, dealDateBtween: 0, page };
    if (reg.city) dealParams.city = reg.city;
    if (reg.state) dealParams.state = reg.state;
    if (reg.dong) dealParams.dong = reg.dong;

    const [news, deals] = await Promise.all([
      fetchJson('/newsToday', { page: 1, cityCode: '', stateCode: '', selectDate: date }),
      fetchJson('/todayRank', dealParams),
    ]);

    // 요약
    const sumEl = $('#sec-summary');
    sumEl.innerHTML = '';

    const todayAll = Array.isArray(news?.todayAll) ? news.todayAll : [];
    const todayMaxList = Array.isArray(news?.todayMaxList) ? news.todayMaxList : [];
    const nation = todayAll.find(r => r && r.CITY === '전국');
    const focusCity = reg.cityName && !/전체/.test(reg.cityName) ? reg.cityName : null;

    // 요약에 보여줄 row가 있는지 판별 (STATE 필드가 있어야 유효)
    const hasSummaryData = focusCity
      ? !!todayAll.find(r => r && r.CITY === focusCity && r.STATE)
      : todayAll.some(r => r && r.STATE);

    if (!hasSummaryData) {
      renderEmptyState(sumEl, {
        title: '아직 실거래 요약 데이터가 없어요',
        desc: `${date} 기준 ${focusCity || '선택하신 지역'}에 집계된 실거래가 아직 등록되지 않았습니다.<br>국토부 공개 시점에 따라 늦게 반영될 수 있어요.`,
        hint: '다른 날짜를 선택하거나 잠시 후 새로고침해 주세요',
      });
    } else {
      // 상단 전체 저장 바
      const bar = document.createElement('div');
      bar.className = 'summary-bar';
      bar.innerHTML = `
        <span>📊 일일 종합 (${date})</span>
        <button class="save-all-btn">📥 전체 저장</button>`;
      sumEl.appendChild(bar);

      // 3개 카드를 감쌀 컨테이너
      const pack = document.createElement('div');
      pack.className = 'summary-pack';
      sumEl.appendChild(pack);

      if (nation && nation.STATE) {
        renderRegionTable(pack, { title: '전국', dateStr: date, headerLabel: '시/군/구', rows: parseCityRow(nation) });
      }

      if (focusCity) {
        const focusRow = todayAll.find(r => r && r.CITY === focusCity);
        if (focusRow && focusRow.STATE) renderRegionTable(pack, { title: focusCity, dateStr: date, headerLabel: '시/군/구', rows: parseCityRow(focusRow) });
        const focusMax = todayMaxList.filter(r => r && r.CITY === focusCity);
        if (focusMax.length) renderMaxByGu(pack, { title: `${focusCity} 시/구별 최고가`, dateStr: date, rows: focusMax });
      } else {
        for (const row of todayAll) {
          if (!row || row.CITY === '전국' || !row.STATE) continue;
          renderRegionTable(pack, { title: row.CITY, dateStr: date, headerLabel: '시/군/구', rows: parseCityRow(row) });
        }
        if (todayMaxList.length) {
          renderMaxByGu(pack, { title: '전국 시/구별 최고가', dateStr: date, rows: todayMaxList });
        }
      }

      bar.querySelector('.save-all-btn').onclick = () => {
        saveAsImage(pack, `일일종합_${date}.png`);
      };
    }

    // 거래 카드
    const total = deals?.count || 0;
    const dealRows = Array.isArray(deals?.list) ? deals.list : [];
    const totalPages = Math.max(1, Math.ceil(total / 30));
    lastQueryInfo = { dateStr: date, total };
    if (!dealRows.length) {
      renderEmptyState($('#sec-deals'), {
        title: '표시할 실거래 내역이 없어요',
        desc: `${date} · ${[reg.cityName, reg.stateName, reg.dong].filter(x => x && !/전체/.test(x)).join(' ') || '전국'} 기준으로<br>등록된 실거래가 아직 없습니다.`,
        hint: '다른 날짜·지역을 선택해 보세요',
      });
    } else {
      renderDealsSection($('#sec-deals'), {
        rows: dealRows, total, dateStr: date, pageNum: page, totalPages,
      });
    }

    const ms = Math.round(performance.now() - t0);
    $('#status').textContent = `✓ ${date} / ${page}페이지 / 총 ${total}건 (${ms}ms)`;
  } catch (e) {
    renderEmptyState($('#sec-summary'), {
      title: '데이터를 불러오지 못했어요',
      desc: '잠시 후 다시 시도해 주세요.<br>문제가 계속되면 새로고침해 주세요.',
      hint: e.message,
    });
    $('#sec-deals').innerHTML = '';
    console.error(e);
  }
}

    $$('.tab').forEach(t => t.classList.remove('active'));

    const key = tab.dataset.tab;
    $('.col-summary').classList.toggle('active', key === 'summary');
    $('.col-deals').classList.toggle('active', key === 'deals');
  };
});

$('#loadBtn').onclick = () => { page = 1; load(); };
$('#todayBtn').onclick = () => { $('#dateInput').value = isoToday(); page = 1; load(); };
$('#dateInput').onkeydown = e => { if (e.key === 'Enter') { page = 1; load(); } };

// 초기화
(async () => {
  $('#dateInput').value = isoToday();
  await loadCities();
  renderFavs();
  load();
})();
</script>
</body>
</html>
